# Main LBO Configuration — SaaS Company Acquisition
# This file demonstrates a typical mid-market SaaS LBO

company:
  name: TechCo_Synthetic
  sector: SaaS
  initial_revenue: 100000000  # $100M
  initial_ebitda_margin: 0.25  # 25% EBITDA margin
  initial_depreciation: 3000000  # $3M
  revenue_growth_rates: [0.30, 0.25, 0.20, 0.18, 0.15]
  margin_expansion_bps: [200, 150, 100, 50, 50]
  capex_pct_revenue: 0.03
  nwc_pct_revenue: 0.05
  tax_rate: 0.21

sources_and_uses:
  # Sources
  equity_contribution: 112500000  # ~45% of sources
  senior_debt: 75625000  # ~30%
  mezzanine_debt: 34375000  # ~14%
  high_yield_debt: 27500000  # ~11%
  revolver_commitment: 0
  cash_on_balance_sheet: 0

  # Uses
  purchase_price: 206250000  # Entry multiple 8.25x on $25M EBITDA
  transaction_fees: 2062500  # 1% of purchase price
  refinancing_debt: 0
  capex: 0

tranches:
  - name: Senior Term Loan B
    tranche_type: senior_term_b
    principal: 75625000
    interest_rate: 0.075  # SOFR + 350bps
    amortization_rate: 0.01  # 1% p.a. linear
    maturity_years: 7.0
    cash_sweep_rate: 0.50  # 50% excess cash sweep
    pik_toggle: false
    pik_rate: 0.0
    commitment_fee: 0.0

  - name: Mezzanine Debt
    tranche_type: mezzanine
    principal: 34375000
    interest_rate: 0.10  # 10% cash pay
    amortization_rate: 0.0  # Bullet
    maturity_years: 5.0
    cash_sweep_rate: 0.0
    pik_toggle: true
    pik_rate: 0.02  # 2% PIK
    commitment_fee: 0.0

  - name: High Yield Bonds
    tranche_type: high_yield
    principal: 27500000
    interest_rate: 0.09  # 9%
    amortization_rate: 0.0  # Bullet
    maturity_years: 6.0
    cash_sweep_rate: 0.0
    pik_toggle: false
    pik_rate: 0.0
    commitment_fee: 0.0

exit_assumptions:
  hold_period_years: 5
  exit_ebitda_multiple: 9.5  # Expansion from 8.25x entry
  entry_ebitda_multiple: 8.25
  terminal_growth_rate: 0.02
  use_terminal_value: false

covenants:
  max_total_leverage: 5.5
  min_fixed_charge_coverage: 1.1
  min_interest_coverage: 1.8

seed: 42
data_version: "0.1.0"
